apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexearn-postgres
  namespace: nexearn
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexearn-postgres
  namespace: nexearn
  labels:
    app: nexearn-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nexearn-postgres
  template:
    metadata:
      labels:
        app: nexearn-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: pg
              containerPort: 5432
          envFrom:
            - secretRef:
                name: nexearn-secrets
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "nexearn", "-d", "nexearn"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "nexearn", "-d", "nexearn"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nexearn-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: nexearn-postgres
  namespace: nexearn
spec:
  type: ClusterIP
  selector:
    app: nexearn-postgres
  ports:
    - name: pg
      port: 5432
      targetPort: pg
