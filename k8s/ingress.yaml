apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexearn-platform
  namespace: nexearn
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: nexops.santhira.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexearn-platform
                port:
                  name: http
