apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexearn-redis
  namespace: nexearn
  labels:
    app: nexearn-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexearn-redis
  template:
    metadata:
      labels:
        app: nexearn-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nexearn-redis
  namespace: nexearn
spec:
  type: ClusterIP
  selector:
    app: nexearn-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
